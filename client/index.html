<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Client Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:Inter;
}

body{
margin:0;
background:#f5f7fb;
display:flex;
height:100vh;
color:#1f2937;
}

/* Sidebar */

.sidebar{
width:240px;
background:#111827;
color:white;
padding:30px 20px;
}

.logo{
font-weight:600;
font-size:18px;
margin-bottom:40px;
}

.nav{
margin:15px 0;
opacity:.8;
cursor:pointer;
}

.nav:hover{
opacity:1;
}

/* Main */

.main{
flex:1;
padding:40px;
overflow:auto;
}

/* Cards */

.card{
background:white;
padding:24px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:20px;
}

/* Progress */

.progress-bar{
height:10px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
background:#6366f1;
width:0%;
transition:width .6s;
}

/* Tasks */

.task{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
}

.completed{
background:#d1fae5;
color:#065f46;
}

.progressing{
background:#fef3c7;
color:#92400e;
}

.pending{
background:#e5e7eb;
color:#374151;
}

/* Deliverables */

.report{
display:flex;
justify-content:space-between;
padding:12px;
border-radius:8px;
background:#f9fafb;
margin-top:10px;
}

.report a{
text-decoration:none;
color:#6366f1;
}

/* Timeline */

.timeline-item{
border-left:3px solid #6366f1;
padding-left:15px;
margin-top:10px;
color:#6b7280;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">Neelay Portal</div>

<div class="nav">Overview</div>
<div class="nav">Progress</div>
<div class="nav">Deliverables</div>
<div class="nav">Timeline</div>
<div class="nav">Support</div>

</div>

<div class="main">

<div class="card">

<h3 id="projectTitle"></h3>
<p id="phase"></p>

<div class="progress-bar">
<div id="progress" class="progress"></div>
</div>

<p id="progressText"></p>

</div>

<div class="card">

<h3>Project Tasks</h3>

<div id="tasks"></div>

</div>

<div class="card">

<h3>Deliverables</h3>

<div id="reports"></div>

</div>

<div class="card">

<h3>Timeline</h3>

<div class="timeline-item">Week 1 — Discovery</div>
<div class="timeline-item">Week 2 — Research</div>
<div class="timeline-item">Week 3 — UX Strategy</div>
<div class="timeline-item">Week 4 — UI Design</div>
<div class="timeline-item">Week 5 — Development</div>
<div class="timeline-item">Week 6 — Launch</div>

</div>

</div>

<script>

fetch('../data/project.json')
.then(res=>res.json())
.then(data=>{

document.getElementById("projectTitle").innerText=data.project

document.getElementById("phase").innerText=data.phase

document.getElementById("progress").style.width=data.progress+"%"

document.getElementById("progressText").innerText=data.progress+"% Completed"

let tasksHTML=""

data.tasks.forEach(task=>{

let statusClass="pending"

if(task.status=="Completed") statusClass="completed"
if(task.status=="In Progress") statusClass="progressing"

tasksHTML+=`
<div class="task">
<span>${task.name}</span>
<span class="badge ${statusClass}">${task.status}</span>
</div>
`

})

document.getElementById("tasks").innerHTML=tasksHTML

let reportHTML=""

data.reports.forEach(report=>{

reportHTML+=`
<div class="report">
<span>${report.name}</span>
<a href="${report.file}" target="_blank">Download</a>
</div>
`

})

document.getElementById("reports").innerHTML=reportHTML

})

</script>

</body>
</html>
