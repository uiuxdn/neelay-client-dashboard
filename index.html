<!DOCTYPE html>
<html>
<head>
<title>Neelay Project Dashboard</title>
<style>
body{
font-family: Arial, sans-serif;
background:#f7f7f7;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.status{
margin-top:30px;
}

.task{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.done{
color:green;
}

.pending{
color:orange;
}
</style>
</head>

<body>

<div class="container">

<h1>Neelay Design Studio</h1>
<p style="text-align:center;">Website Project Dashboard</p>

<div class="status">

<div class="task">
<span>Discovery</span>
<span class="done">Completed</span>
</div>

<div class="task">
<span>Research</span>
<span class="done">Completed</span>
</div>

<div class="task">
<span>UX Strategy</span>
<span class="pending">In Progress</span>
</div>

<div class="task">
<span>Wireframes</span>
<span>Pending</span>
</div>

<div class="task">
<span>UI Design</span>
<span>Pending</span>
</div>

<div class="task">
<span>Development</span>
<span>Pending</span>
</div>

</div>

</div>

</body>
</html>
